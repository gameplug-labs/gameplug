name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release Version (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [Win32, x64]
        include:
          - arch: Win32
            output_dir: x32
          - arch: x64
            output_dir: x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Vulkan SDK
        uses: jakoch/install-vulkan-sdk-action@v1.1.1
        with:
          vulkan_version: 1.3.296.0
          cache: false

      - name: Configure CMake
        run: cmake -B build -A ${{ matrix.arch }}

      - name: Build
        run: cmake --build build --config Release

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.output_dir }}
          path: bin/${{ matrix.output_dir }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download x32
        uses: actions/download-artifact@v4
        with:
          name: build-x32
          path: bin/x32

      - name: Download x64
        uses: actions/download-artifact@v4
        with:
          name: build-x64
          path: bin/x64

      - name: Prepare Assets
        run: |
          mkdir assets
          
          # d3d9_x32.zip (x32 only)
          # The file is in bin/x32/d3d9/dinput8.dll
          zip -j assets/d3d9_x32.zip bin/x32/d3d9/dinput8.dll bin/x32/d3d9/version.dll bin/x32/d3d9/winmm.dll
          
          # d3d9_skyrim_x32.zip (x32 only)
          # The file is in bin/x32/d3d9_skyrim/dinput8.dll
          zip -j assets/d3d9_skyrim_x32.zip bin/x32/d3d9_skyrim/dinput8.dll bin/x32/d3d9_skyrim/version.dll bin/x32/d3d9_skyrim/winmm.dll
          
          # d3d10_x32.zip (x32 only)
          # The file is in bin/x32/d3d10/dinput8.dll
          zip -j assets/d3d10_x32.zip bin/x32/d3d10/dinput8.dll bin/x32/d3d10/version.dll bin/x32/d3d10/winmm.dll
          
          # d3d11_x32.zip (x32 only)
          # The file is in bin/x32/d3d11/dinput8.dll
          zip -j assets/d3d11_x32.zip bin/x32/d3d11/dinput8.dll bin/x32/d3d11/version.dll bin/x32/d3d11/winmm.dll
          
          # d3d11_x64.zip (x64 only)
          # The file is in bin/x64/d3d11/dinput8.dll
          zip -j assets/d3d11_x64.zip bin/x64/d3d11/dinput8.dll bin/x64/d3d11/version.dll bin/x64/d3d11/winmm.dll
          
          # d3d12_x64.zip (x64 only)
          # The file is in bin/x64/d3d12/dinput8.dll
          zip -j assets/d3d12_x64.zip bin/x64/d3d12/dinput8.dll bin/x64/d3d12/version.dll bin/x64/d3d12/winmm.dll

          # vk_x32.zip
          zip -j assets/vk_x32.zip bin/x32/dinput8.dll bin/x32/version.dll bin/x32/winmm.dll
          
          # vk_x64.zip
          zip -j assets/vk_x64.zip bin/x64/dinput8.dll bin/x64/version.dll bin/x64/winmm.dll

          # Create Nexus Mods GamePlug structure
          mkdir -p nexus/GamePlug/d3d9_x32
          mkdir -p nexus/GamePlug/d3d9_skyrim_x32
          mkdir -p nexus/GamePlug/d3d10_x32
          mkdir -p nexus/GamePlug/d3d11_x32
          mkdir -p nexus/GamePlug/d3d11_x64
          mkdir -p nexus/GamePlug/d3d12_x64
          mkdir -p nexus/GamePlug/vk_x32
          mkdir -p nexus/GamePlug/vk_x64

          # Copy files
          cp bin/x32/d3d9/dinput8.dll bin/x32/d3d9/version.dll nexus/GamePlug/d3d9_x32/
          cp bin/x32/d3d9_skyrim/dinput8.dll bin/x32/d3d9_skyrim/version.dll nexus/GamePlug/d3d9_skyrim_x32/
          cp bin/x32/d3d10/dinput8.dll bin/x32/d3d10/version.dll nexus/GamePlug/d3d10_x32/
          cp bin/x32/d3d11/dinput8.dll bin/x32/d3d11/version.dll nexus/GamePlug/d3d11_x32/
          cp bin/x64/d3d11/dinput8.dll bin/x64/d3d11/version.dll nexus/GamePlug/d3d11_x64/
          cp bin/x64/d3d12/dinput8.dll bin/x64/d3d12/version.dll nexus/GamePlug/d3d12_x64/
          cp bin/x32/vklayer.dll bin/x32/VK_LAYER_GAMEPLUG.json bin/x32/dinput8.dll bin/x32/version.dll nexus/GamePlug/vk_x32/
          cp bin/x64/vklayer.dll bin/x64/VK_LAYER_GAMEPLUG.json bin/x64/dinput8.dll bin/x64/version.dll nexus/GamePlug/vk_x64/

          # Create readme.txt
          cat << 'EOF' > nexus/GamePlug/readme.txt
          Place the any 1 file dinput8.dll or version.dll in your game executable folder

          x32 games
          d3d9, d3d10, d3d11

          x64 games
          d3d11, d3d12

          x32 & x 64 games
          vk
          EOF

          # Zip Nexus Mods package
          (cd nexus && zip -r ../GamePlug.zip GamePlug)

          # Clean the version string and save it to the global environment
          INPUT_VERSION="${{ github.event.inputs.version }}"
          CLEAN_VERSION="${INPUT_VERSION#v}"
          echo "NEXUS_CLEAN_VERSION=$CLEAN_VERSION" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Release ${{ github.event.inputs.version }}
          files: assets/*.zip
          generate_release_notes: true
          draft: false
          prerelease: false

      - name: Upload to Nexus Mods
        uses: Nexus-Mods/upload-action@v1.0.0-beta.7
        with:
          api_key: ${{ secrets.NEXUSMODS_API_KEY }}
          file_group_id: ${{ secrets.NEXUSMODS_FILE_GROUP_ID }}
          filename: GamePlug.zip
          version: ${{ env.NEXUS_CLEAN_VERSION }}
